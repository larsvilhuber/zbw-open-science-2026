name: Build and Publish Presentation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compile-presentation:
    name: Build presentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'renv'
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render presentation
        run: quarto render index.qmd --output-dir _html

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-presentation
          retention-days: 1
          path: _html
  create-pdf:
    needs: compile-presentation
    runs-on: ubuntu-latest
    steps:
    - name: Download pages artifact
      uses: actions/download-artifact@v8
      with:
        name: artifact-presentation
        path: _html
    - name: Check permissions
      run: |
        ls -la _html
        chmod -R a+rwX _html
        ls -la _html
        
    - name: Create PDF
      uses: addnab/docker-run-action@v3
      with:
        image: astefanutti/decktape
        options: -v ${{ github.workspace }}/_html:/slides 
        run: |
          node /decktape/decktape.js --chrome-path /usr/bin/chromium-browser --chrome-arg=--no-sandbox --chrome-arg=--disable-gpu index.html index.pdf

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: artifact-presentation-pdf
        path: _html/index.pdf
  deploy-all:
    runs-on: ubuntu-latest
    needs: 
      - compile-presentation
      - create-pdf
    steps:
    # Pull down both artifacts
    
    - name: Download Pres Artifacts
      uses: actions/download-artifact@v8
      with:
            name: artifact-presentation
            path: ./artifact-presentation
    - name: Download Pres PDF
      uses: actions/download-artifact@v8
      with:
            name: artifact-presentation-pdf
            path: ./artifact-presentation-pdf
    # Adjust this to reflect what you are posting
    - name: Move stuff
      run: |
          ls -lR
          mv artifact-presentation website
          mv artifact-presentation-pdf/index.pdf website/presentation.pdf
    # Prepare the GitHub Pages action
    - name: prepare GitHub Pages action
      uses: actions/upload-pages-artifact@v5    
      with:
        path: ./website

  publish:
    needs: deploy-all
    
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v6
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5 
        
        
  
